<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novi turnir</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <style>
        .form-card { margin:0 auto; max-width:560px; }
        .fmt-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .fmt { margin:0; cursor:pointer; }
        .fmt input { position:absolute; opacity:0; pointer-events:none; }
        .fmt span { display:block; border:1px solid #2d5a2d; border-radius:10px; padding:12px;
                    color:#ccc; transition:.15s; }
        .fmt span small { display:block; color:#7f9c7f; font-size:12px; margin-top:4px; font-weight:400; }
        .fmt span b { color:#cfe8cf; }
        .fmt input:checked + span { border-color:#4caf50; background:#132613; }
        .fmt input:checked + span b { color:#4caf50; }
        .target-group { display:flex; gap:10px; }
        .target-group label { flex:1; margin:0; cursor:pointer; }
        .target-group input { position:absolute; opacity:0; pointer-events:none; }
        .target-group span { display:block; text-align:center; padding:11px; border:1px solid #2d5a2d;
                             border-radius:8px; color:#ccc; }
        .target-group input:checked + span { background:#4caf50; color:#fff; border-color:#4caf50; font-weight:600; }
        .players { display:grid; grid-template-columns:1fr 1fr; gap:8px; max-height:260px; overflow-y:auto;
                   border:1px solid #2d5a2d; border-radius:10px; padding:10px; }
        .pchk { display:flex; align-items:center; gap:8px; margin:0; color:#e6efe6; font-size:14px; }
        .pchk input { width:auto; margin:0; }
        .count { color:#8fae8f; font-size:13px; margin:8px 0; }
        .form-error { color:#f44336; margin-bottom:12px; }
    </style>
</head>
<body>
<nav>
    <a class="logo" href="/">🎴 Bela Tracker</a>
    <div>
        <a href="/">Početna</a>
        <a href="/matches">Partije</a>
        <a href="/players">Igrači</a>
        <a href="/statistics">Statistika</a>
        <a href="/tournaments">Turniri</a>
    </div>
</nav>

<div class="container">
    <h2 style="text-align:center;">Novi turnir</h2>
    <div class="form-card">
        <div class="form-error" th:if="${error}" th:text="${error}"></div>
        <form th:action="@{/tournaments/save}" method="post">

            <div class="form-group">
                <label>Naziv turnira</label>
                <input type="text" name="name" placeholder="npr. Subotnja bela"/>
            </div>

            <div class="form-group">
                <label>Format</label>
                <div class="fmt-grid">
                    <label class="fmt"><input type="radio" name="format" value="KNOCKOUT" checked/>
                        <span><b>Ždrijeb na ispadanje</b><small>Slučajni timovi, tko izgubi ispada.</small></span></label>
                    <label class="fmt"><input type="radio" name="format" value="LEAGUE"/>
                        <span><b>Liga</b><small>Svako sa svakim, tablica.</small></span></label>
                    <label class="fmt"><input type="radio" name="format" value="GROUPS_KNOCKOUT"/>
                        <span><b>Grupe + ždrijeb</b><small>Grupe pa ispadanje (8+ igrača).</small></span></label>
                    <label class="fmt"><input type="radio" name="format" value="AMERICAN"/>
                        <span><b>Američki</b><small>Partneri se miješaju (broj ÷ 4).</small></span></label>
                </div>
            </div>

            <div class="form-group">
                <label>Partija se igra do</label>
                <div class="target-group">
                    <label><input type="radio" name="targetScore" value="501" checked/><span>501</span></label>
                    <label><input type="radio" name="targetScore" value="701"/><span>701</span></label>
                    <label><input type="radio" name="targetScore" value="1001"/><span>1001</span></label>
                </div>
            </div>

            <div class="form-group">
                <label>Igrači</label>
                <div class="players">
                    <label class="pchk" th:each="p : ${players}">
                        <input type="checkbox" name="playerIds" th:value="${p.id}" onchange="updateCount()"/>
                        <span th:text="${p.name}">Ime</span>
                    </label>
                    <span th:if="${#lists.isEmpty(players)}" style="color:#888;">Nema igrača — dodaj ih prvo.</span>
                </div>
                <div class="count">Odabrano: <span id="cnt">0</span></div>
            </div>

            <button type="submit" class="btn">Kreiraj turnir</button>
            <a href="/tournaments" class="btn btn-outline">Odustani</a>
        </form>
    </div>
</div>

<script>
    function updateCount(){
        document.getElementById('cnt').textContent =
            document.querySelectorAll('input[name="playerIds"]:checked').length;
    }
</script>
</body>
</html>
