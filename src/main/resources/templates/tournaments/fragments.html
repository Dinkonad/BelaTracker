<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tmatch(tm, tid)" class="tmatch">
    <span class="ta" th:classappend="${tm.winnerSide == 1} ? ' win' : ''" th:text="${tm.labelA}">A</span>
    <span class="mid">
        <span th:if="${tm.match != null}" th:text="${tm.match.team1Total} + ' : ' + ${tm.match.team2Total}">0 : 0</span>
        <span th:unless="${tm.match != null}">vs</span>
    </span>
    <span class="tb" th:classappend="${tm.winnerSide == 2} ? ' win' : ''" th:text="${tm.labelB}">B</span>
    <span class="act">
        <span th:if="${tm.bye}" class="muted">slob. prolaz</span>
        <a th:if="${!tm.bye and tm.match == null and tm.ready}" class="btn btn-sm"
           th:href="@{'/tournaments/' + ${tid} + '/play/' + ${tm.id}}">Igraj</a>
        <a th:if="${!tm.bye and tm.match != null and !tm.match.finished}" class="btn btn-sm btn-outline"
           th:href="@{'/matches/' + ${tm.match.id}}">Nastavi</a>
        <span th:if="${!tm.bye and tm.match != null and tm.match.finished}" class="muted">gotovo</span>
        <span th:if="${!tm.bye and tm.match == null and !tm.ready}" class="muted">čeka</span>
    </span>
</div>
</body>
</html>
