<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="tmatch(tm, tid)">
  <div th:if="${tm != null}" class="tmatch">
    <span class="ta" th:classappend="${tm.winnerSide == 1} ? ' win' : ''" th:text="${tm.labelA}">Tim A</span>
    <span class="mid">
      <span th:if="${tm.winnerSide != 0 and !tm.bye}" th:text="${tm.scoreA} + ' : ' + ${tm.scoreB}">0 : 0</span>
      <span th:if="${tm.bye}">—</span>
      <span th:if="${tm.winnerSide == 0 and !tm.bye}">vs</span>
    </span>
    <span class="tb" th:classappend="${tm.winnerSide == 2} ? ' win' : ''" th:text="${tm.labelB}">Tim B</span>
    <span class="act">
      <a th:if="${tm.winnerSide == 0 and !tm.bye and tm.ready}" class="btn btn-sm"
         th:href="@{'/tournaments/' + ${tid} + '/quick/' + ${tm.id}}">Upiši rezultat</a>
      <a th:if="${tm.winnerSide != 0 and !tm.bye}" class="btn btn-sm btn-outline"
         th:href="@{'/tournaments/' + ${tid} + '/quick/' + ${tm.id}}">Uredi</a>
      <span th:if="${tm.bye}" class="muted">slob. prolaz</span>
      <span th:if="${tm.winnerSide == 0 and !tm.bye and !tm.ready}" class="muted">čeka</span>
    </span>
  </div>
</th:block>
</body>
</html>
