<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dijeljenje</title>
    <style>
        body { font-family:'Roboto',sans-serif; background:#F1EFEC; padding:24px; margin:0; }
        .card { max-width:420px; margin:0 auto; background:#123458; border-radius:16px;
                padding:22px; color:#fff; }
        h1 { font-size:20px; margin:0 0 18px; }
        .score-row { display:flex; gap:16px; align-items:center; justify-content:center; margin-bottom:18px; }
        .col { text-align:center; }
        .col span { display:block; font-weight:700; margin-bottom:6px; font-size:18px; }
        .col input { width:100px; padding:12px; font-size:22px; text-align:center;
                     border:none; border-radius:8px; }
        .sep { font-size:24px; font-weight:700; }
        .caller { margin-bottom:18px; }
        .caller label { font-size:13px; opacity:.85; display:block; margin-bottom:6px; }
        .caller select { width:100%; padding:10px; border:none; border-radius:8px; font-size:15px; }
        .save-btn { width:100%; padding:14px; border:none; border-radius:8px;
                    font-size:16px; cursor:pointer; background:#5D8AA8; color:#fff; }
        .back { display:block; text-align:center; margin-top:14px; color:#9bbdd1; text-decoration:none; font-size:14px; }
    </style>
</head>
<body>
<div class="card">
    <h1 th:text="${round.id != null} ? 'Uredi dijeljenje' : 'Novo dijeljenje'">Dijeljenje</h1>

    <form th:action="@{'/matches/' + ${matchId} + '/rounds/save'}" method="post" th:object="${round}">
        <input type="hidden" th:field="*{id}"/>

        <div class="score-row">
            <div class="col">
                <span>MI</span>
                <input type="number" th:field="*{team1Score}" min="0" placeholder="0" required/>
            </div>
            <div class="sep">:</div>
            <div class="col">
                <span>VI</span>
                <input type="number" th:field="*{team2Score}" min="0" placeholder="0" required/>
            </div>
        </div>

        <div class="caller">
            <label>Tko je zvao</label>
            <select th:field="*{caller}">
                <option value="0">—</option>
                <option value="1">MI</option>
                <option value="2">VI</option>
            </select>
        </div>

        <button type="submit" class="save-btn">Spremi dijeljenje</button>
    </form>

    <a class="back" th:href="@{'/matches/' + ${matchId}}">← Natrag na blok</a>
</div>
</body>
</html>
