<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dijeljenje</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <style>
        .form-card { margin: 0 auto; }
        .score-row { display:flex; gap:16px; align-items:flex-end; justify-content:center; margin-bottom:18px; }
        .score-col { text-align:center; }
        .score-col label { margin-bottom:8px; font-size:18px; font-weight:700; }
        .score-col.mi label { color:#ef5350; }
        .score-col.vi label { color:#ffca28; }
        .score-col input { width:110px; padding:14px; font-size:28px; text-align:center; margin-bottom:0; }
        .sep { font-size:26px; font-weight:700; color:#888; padding-bottom:12px; }
        .row-actions { display:flex; gap:10px; margin-top:6px; }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="/">🎴 Bela Tracker</a>
    <div>
        <a href="/">Početna</a>
        <a href="/matches">Partije</a>
        <a href="/players">Igrači</a>
        <a href="/statistics">Statistika</a>
    </div>
</nav>

<div class="container">
    <h2 style="text-align:center;"
        th:text="${round.id != null} ? 'Uredi dijeljenje' : 'Novo dijeljenje'">Dijeljenje</h2>

    <div class="form-card">
        <form th:action="@{'/matches/' + ${matchId} + '/rounds/save'}" method="post" th:object="${round}">
            <input type="hidden" th:field="*{id}"/>

            <div class="score-row">
                <div class="score-col mi">
                    <label>MI</label>
                    <input type="number" th:field="*{team1Score}" min="0" placeholder="0" required/>
                </div>
                <div class="sep">:</div>
                <div class="score-col vi">
                    <label>VI</label>
                    <input type="number" th:field="*{team2Score}" min="0" placeholder="0" required/>
                </div>
            </div>

            <div class="form-group">
                <label>Tko je zvao</label>
                <select th:field="*{caller}">
                    <option value="0">—</option>
                    <option value="1">MI</option>
                    <option value="2">VI</option>
                </select>
            </div>

            <div class="row-actions">
                <button type="submit" class="btn">Spremi</button>
                <a th:href="@{'/matches/' + ${matchId}}" class="btn btn-outline">Odustani</a>
                <a th:if="${round.id != null}" class="btn btn-danger"
                   th:href="@{'/matches/' + ${matchId} + '/rounds/delete/' + ${round.id}}"
                   onclick="return confirm('Obrisati ovo dijeljenje?');">Obriši</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
