<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blok</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <style>
        .board-page { max-width: 560px; margin: 28px auto; padding: 0 16px; }
        .bp-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
        .bp-head h2 { color:#4caf50; margin:0; font-size:30px; }
        .bp-head a { color:#9bbf9b; text-decoration:none; font-size:14px; }
        .bp-head a:hover { color:#f44336; }
        .bp-sub { color:#8fae8f; font-size:14px; margin-bottom:6px; }
        .dealer-line { font-size:15px; color:#cfe8cf; margin-bottom:18px; }
        .dealer-line b { color:#4caf50; }

        .board { background:#0f1f0f; border:1px solid #2d5a2d; border-radius:16px; padding:18px 22px; }
        .bhead { display:flex; padding-bottom:8px; }
        .bhead span { flex:1; text-align:center; font-size:32px; font-weight:800; letter-spacing:.05em; }
        .bhead .mi { color:#ef5350; }
        .bhead .vi { color:#ffca28; }
        .brows { min-height:150px; }
        .brow { display:flex; text-decoration:none; color:#ffffff; border-bottom:1px solid #1e3a1e; }
        .brow span { flex:1; text-align:center; font-size:40px; font-weight:700; padding:14px 0; }
        .brow:hover { background:#162916; }
        .bempty { text-align:center; color:#7a7a7a; padding:46px 0; font-size:15px; }
        .btotal { display:flex; border-top:3px solid #4caf50; margin-top:4px; }
        .btotal span { flex:1; text-align:center; font-size:46px; font-weight:800; padding-top:14px; }

        .addbtn { display:block; width:max-content; margin:24px auto 0; background:#4caf50;
                  color:#fff; text-decoration:none; padding:15px 34px; border-radius:28px;
                  font-weight:700; font-size:20px; }
        .addbtn:hover { background:#388e3c; }
        .winner { text-align:center; margin-top:22px; font-size:26px; font-weight:800; color:#FFD166; }
        .back { display:block; text-align:center; margin-top:24px; color:#4caf50; text-decoration:none; font-size:15px; }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="/">🎴 Bela Tracker</a>
    <div>
        <a href="/">Početna</a>
        <a href="/matches">Partije</a>
        <a href="/players">Igrači</a>
        <a href="/statistics">Statistika</a>
        <a href="/tournaments">Turniri</a>
    </div>
</nav>

<div class="board-page">

    <div class="bp-head">
        <h2>Blok</h2>
        <a th:href="@{'/matches/delete/' + ${match.id}}"
           onclick="return confirm('Obrisati partiju?');">Obriši partiju</a>
    </div>
    <div class="bp-sub" th:text="'Igra se do ' + ${match.targetScore}">Igra se do 1001</div>
    <div class="dealer-line">Dijeli: <b th:text="${dealerName} ?: '—'">—</b></div>

    <div class="board">
        <div class="bhead"><span class="mi">MI</span><span class="vi">VI</span></div>
        <div class="brows">
            <a class="brow" th:each="r : ${match.rounds}"
               th:href="@{'/matches/' + ${match.id} + '/rounds/edit/' + ${r.id}}">
                <span th:text="${r.team1Score}">0</span>
                <span th:text="${r.team2Score}">0</span>
            </a>
            <div class="bempty" th:if="${#lists.isEmpty(match.rounds)}">
                Klikni + za prvo dijeljenje
            </div>
        </div>
        <div class="btotal">
            <span th:text="${match.team1Total}">0</span>
            <span th:text="${match.team2Total}">0</span>
        </div>
    </div>

    <a th:unless="${match.finished}" class="addbtn"
       th:href="@{'/matches/' + ${match.id} + '/rounds/new'}">+ Dijeljenje</a>

    <div th:if="${match.finished}" class="winner"
         th:text="'🏆 Pobjeda: ' + (${match.winner == 1} ? 'MI' : 'VI')">Pobjednik</div>

    <a class="back" href="/matches">← Sve partije</a>

</div>

</body>
</html>
