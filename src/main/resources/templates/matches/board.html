<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bela Blok</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body{font-family:'Roboto',sans-serif;background:#F1EFEC;margin:0;padding:24px;}
        .block{max-width:420px;margin:0 auto;background:#123458;border-radius:16px;
               padding:18px;color:#fff;min-height:560px;display:flex;flex-direction:column;}
        .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
        .top h1{font-size:20px;margin:0;}
        .top .icons a{margin-left:14px;cursor:pointer;opacity:.85;color:#fff;text-decoration:none;}
        .meta{font-size:12px;opacity:.7;margin-bottom:10px;}
        .head{display:flex;justify-content:space-around;font-size:22px;font-weight:700;
              padding-bottom:8px;}
        .rounds{flex:1;}
        .round{display:flex;align-items:center;justify-content:space-between;
               padding:14px 6px;border-bottom:1px solid #5D8AA8;font-size:24px;}
        .round .s{width:70px;text-align:center;}
        .round .mid{display:flex;gap:10px;align-items:center;}
        .round .ico{opacity:.7;font-size:18px;cursor:pointer;color:#fff;text-decoration:none;}
        .empty{text-align:center;opacity:.6;padding:36px 0;}
        .add{align-self:flex-end;width:54px;height:54px;border-radius:50%;
             background:#5D8AA8;color:#fff;font-size:28px;margin:14px 0;
             display:flex;align-items:center;justify-content:center;text-decoration:none;}
        .total{border-top:3px solid #fff;display:flex;justify-content:space-around;
               align-items:center;font-size:26px;font-weight:700;padding-top:12px;}
        .dealer{font-size:13px;opacity:.85;margin-top:10px;display:flex;align-items:center;gap:6px;}
        .dealer .material-icons{cursor:pointer;font-size:16px;}
        .dealer-form{display:none;gap:8px;margin-top:8px;}
        .dealer-form input{flex:1;border:none;border-radius:6px;padding:8px;}
        .dealer-form button{border:none;border-radius:6px;background:#5D8AA8;color:#fff;padding:8px 12px;cursor:pointer;}
        .winner{text-align:center;margin-top:14px;font-size:20px;font-weight:700;color:#FFD166;}
        .finish{display:block;text-align:center;margin-top:14px;background:#2e7d32;color:#fff;
                padding:12px;border-radius:8px;text-decoration:none;font-weight:700;}
        .err{background:#c0392b;color:#fff;padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:10px;text-align:center;}
        .back{display:block;text-align:center;margin-top:14px;color:#5D8AA8;text-decoration:none;font-size:14px;}
    </style>
</head>
<body>
<div class="block">

    <div class="top">
        <h1>Bela Blok</h1>
        <div class="icons">
            <a href="/matches" title="Sve partije"><span class="material-icons">history</span></a>
            <a th:href="@{'/matches/delete/' + ${match.id}}"
               onclick="return confirm('Obrisati partiju?');" title="Obriši"><span class="material-icons">delete</span></a>
        </div>
    </div>

    <div class="meta">
        <span th:text="${match.date}">datum</span> ·
        <span th:text="'do ' + ${match.targetScore}">do 1001</span>
    </div>

    <div th:if="${error}" class="err" th:text="${error}">greška</div>

    <div class="head"><div>MI</div><div>VI</div></div>

    <div class="rounds">
        <div class="round" th:each="r : ${match.rounds}">
            <span class="s" th:text="${r.team1Score}">0</span>
            <span class="mid">
                <a class="material-icons ico"
                   th:href="@{'/matches/' + ${match.id} + '/rounds/edit/' + ${r.id}}">edit</a>
                <a class="material-icons ico"
                   th:href="@{'/matches/' + ${match.id} + '/rounds/delete/' + ${r.id}}"
                   onclick="return confirm('Obrisati dijeljenje?');">close</a>
            </span>
            <span class="s" th:text="${r.team2Score}">0</span>
        </div>
        <div class="empty" th:if="${#lists.isEmpty(match.rounds)}">
            Još nema upisanih dijeljenja
        </div>
    </div>

    <a th:unless="${match.finished}" class="add"
       th:href="@{'/matches/' + ${match.id} + '/rounds/new'}">+</a>

    <div class="total">
        <span th:text="${match.team1Total}">0</span>
        <span style="font-size:18px;">-</span>
        <span th:text="${match.team2Total}">0</span>
    </div>

    <!-- Pobjednik / zaključivanje -->
    <div th:if="${match.finished}" class="winner"
         th:text="'🏆 Pobjeda: ' + (${match.winner == 1} ? 'MI' : 'VI')">Pobjednik</div>

    <a th:if="${!match.finished and !#lists.isEmpty(match.rounds) and match.team1Total != match.team2Total}"
       class="finish" th:href="@{'/matches/' + ${match.id} + '/finish'}"
       onclick="return confirm('Zaključiti partiju? Statistika igrača će se ažurirati.');">
        Završi partiju
    </a>

    <!-- Dijeli -->
    <div class="dealer">
        <span>Dijeli: <span th:text="${match.dealer} ?: '—'">—</span></span>
        <span class="material-icons" onclick="document.getElementById('dealerForm').style.display='flex';">edit</span>
    </div>
    <form id="dealerForm" class="dealer-form"
          th:action="@{'/matches/' + ${match.id} + '/dealer'}" method="post">
        <input type="text" name="dealer" th:value="${match.dealer}" placeholder="Tko dijeli"/>
        <button type="submit">OK</button>
    </form>

    <a class="back" href="/matches">← Sve partije</a>

</div>
</body>
</html>
