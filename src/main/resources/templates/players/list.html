<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Igrači</title>
</head>
<body>
<h1>Igrači</h1>
<a href="/players/new">+ Dodaj igrača</a>
<a href="/">Početna</a>

<form method="get" action="/players">
    <input type="text" name="search" th:value="${search}" placeholder="Pretraži..."/>
    <button type="submit">Traži</button>
</form>

<table border="1">
    <tr>
        <th>Ime</th>
        <th>Nadimak</th>
        <th>Pobjede</th>
        <th>Porazi</th>
        <th>Akcije</th>
    </tr>
    <tr th:each="player : ${players}">
        <td th:text="${player.name}"></td>
        <td th:text="${player.nickname}"></td>
        <td th:text="${player.wins}"></td>
        <td th:text="${player.losses}"></td>
        <td>
            <a th:href="@{/players/edit/{id}(id=${player.id})}">Uredi</a>
            <a th:href="@{/players/delete/{id}(id=${player.id})}">Obriši</a>
        </td>
    </tr>
</table>
</body>
</html>
