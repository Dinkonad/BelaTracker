<!DOCTYPE html>
<html lang="hr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Igrači</title>
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>

<nav>
    <a class="logo" href="/">🎴 Bela Tracker</a>
    <div>
        <a href="/">Početna</a>
        <a href="/matches">Partije</a>
        <a href="/players">Igrači</a>
        <a href="/statistics">Statistika</a>
    </div>
</nav>

<div class="container">
    <div class="page-head">
        <h2>Igrači</h2>
        <a href="/players/new" class="btn">+ Dodaj igrača</a>
    </div>

    <form method="get" action="/players" class="search-bar">
        <input type="text" name="search" th:value="${search}" placeholder="Pretraži po imenu..."/>
        <button type="submit" class="btn btn-outline">Traži</button>
    </form>

    <table>
        <tr>
            <th>Ime</th>
            <th>Nadimak</th>
            <th>Pobjede</th>
            <th>Porazi</th>
            <th>Akcije</th>
        </tr>
        <tr th:each="player : ${players}">
            <td th:text="${player.name}"></td>
            <td th:text="${player.nickname}"></td>
            <td th:text="${player.wins}"></td>
            <td th:text="${player.losses}"></td>
            <td>
                <a th:href="@{/players/edit/{id}(id=${player.id})}">Uredi</a>
                <a th:href="@{/players/delete/{id}(id=${player.id})}"
                   onclick="return confirm('Obrisati igrača?');">Obriši</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(players)}">
            <td colspan="5" style="text-align:center;color:#888;">Nema igrača.</td>
        </tr>
    </table>
</div>

</body>
</html>
